<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cocktail Menu</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Cocktail Menu</h1>
  <p>Interactive menu for beginner bartenders</p>
</header>

<div class="grid">

  <div class="card">
    <img src="images/pina-colada.png">
    <div class="name">Piña Colada</div>
    <div class="tag">Sweet · Tropical</div>
  </div>

  <div class="card">
    <img src="images/martini.png">
    <div class="name">Classic Martini</div>
    <div class="tag">Dry · Strong</div>
  </div>

  <div class="card">
    <img src="images/aperol-spritz.png">
    <div class="name">Aperol Spritz</div>
    <div class="tag">Bubbly · Fresh</div>
  </div>

  <div class="card">
    <img src="images/beer.png">
    <div class="name">Beer</div>
    <div class="tag">Simple · Cold</div>
  </div>

</div>

</body>
</html>
