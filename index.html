<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cocktail Menu 🍸</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f6f1ea;
    }

    header {
      text-align: center;
      padding: 25px;
      background: #1f1a17;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }

    .name {
      font-weight: bold;
      margin-top: 8px;
    }

    .tag {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <h1>🍸 Cocktail Menu</h1>
  <p>Interactive menu for beginner bartenders</p>
</header>

<div class="grid">

  <div class="card">
    <img src="images/pina-colada.png">
    <div class="name">Piña Colada</div>
    <div class="tag">Sweet · Tropical</div>
  </div>

  <div class="card">
    <img src="images/martini.png">
    <div class="name">Classic Martini</div>
    <div class="tag">Dry · Strong</div>
  </div>

  <div class="card">
    <img src="images/aperol-spritz.png">
    <div class="name">Aperol Spritz</div>
    <div class="tag">Bubbly · Fresh</div>
  </div>

  <div class="card">
    <img src="images/beer.png">
    <div class="name">Beer</div>
    <div class="tag">Simple · Cold</div>
  </div>

</div>

</body>
</html>
